<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de cuentas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Scripts de Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDP4o3pzYG_OpZNqi3o96sUkw2AwkIUOMU",
            authDomain: "cuenta-iara.firebaseapp.com",
            projectId: "cuenta-iara",
            storageBucket: "cuenta-iara.firebasestorage.app",
            messagingSenderId: "1098942038106",
            appId: "1:1098942038106:web:03fdd648707a0e9ece5863"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const docRef = doc(db, "gestion", "cuentas");

        async function iniciarApp() {
            onSnapshot(docRef, (snapshot) => {
                if (snapshot.exists()) {
                    window.datosSectores = snapshot.data().sectores;
                    renderizarSectores();
                }
            });
        }

        async function subirAFirebase() {
            try {
                await setDoc(docRef, { sectores: window.datosSectores });
            } catch (e) {
                console.error("Error al sincronizar:", e);
            }
        }

        window.subirAFirebase = subirAFirebase;
        iniciarApp();
    </script>

    <script>
        let sectorActivoId = null;
        let tipoExtractoActivo = null;
        let editandoIndex = null;

        const opcionesColores = [
            { fondo: 'bg-emerald-100', numero: 'bg-emerald-200/50', nombre: 'Esmeralda' },
            { fondo: 'bg-blue-100', numero: 'bg-blue-200/50', nombre: 'Azul' },
            { fondo: 'bg-purple-100', numero: 'bg-purple-200/50', nombre: 'Púrpura' },
            { fondo: 'bg-rose-100', numero: 'bg-rose-200/50', nombre: 'Rosa' },
            { fondo: 'bg-amber-100', numero: 'bg-amber-200/50', nombre: 'Ámbar' },
            { fondo: 'bg-slate-200', numero: 'bg-slate-300/50', nombre: 'Gris' }
        ];

        function formatNumber(num) {
            return num.toString().replace(/\D/g, "").replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        }

        function formatearInput(input) {
            let val = input.value.replace(/\D/g, "");
            input.value = val ? formatNumber(val) : "";
        }

        function calcularSaldo(sectorId, tipo) {
            const sector = window.datosSectores.find(s => s.id === sectorId);
            if(!sector) return 0;
            return sector.historial.reduce((acc, mov) => {
                const esEfectivo = mov.tipo.includes("Efectivo");
                const esEgreso = mov.tipo.includes("Egreso");
                if (tipo === "Efectivo" && esEfectivo) return acc + (esEgreso ? -mov.monto : mov.monto);
                if (tipo === "Continental" && !esEfectivo) return acc + (esEgreso ? -mov.monto : mov.monto);
                return acc;
            }, 0);
        }

        function renderizarSectores() {
            const contenedor = document.getElementById('contenedor-sectores');
            if(!contenedor) return;
            contenedor.innerHTML = '';
            
            let granTotalContinental = 0;
            window.datosSectores.forEach((sector) => {
                const saldoCont = calcularSaldo(sector.id, "Continental");
                const saldoEfec = calcularSaldo(sector.id, "Efectivo");
                granTotalContinental += saldoCont;

                contenedor.innerHTML += `
                    <div class="${sector.colorFondo} rounded-3xl p-8 shadow-sm relative border border-white/20 transition-all">
                        <div class="flex justify-between items-start mb-6">
                            <h2 class="text-3xl font-bold text-gray-800">${sector.nombre}</h2>
                            <button onclick="abrirConfigSector(${sector.id})" class="text-gray-400 hover:text-gray-600 transition">
                                <i class="fas fa-cog text-xl"></i>
                            </button>
                        </div>
                        <div class="space-y-6">
                            <div>
                                <p class="text-lg font-bold text-gray-600 mb-1 text-[12px] uppercase">Continental</p>
                                <div class="${sector.colorNumero} rounded-xl p-4 inline-flex items-center gap-2 min-w-[200px]">
                                    <span class="text-2xl font-black text-gray-900">${formatNumber(saldoCont)}</span>
                                    <span class="text-lg font-medium italic">gs</span>
                                </div>
                            </div>
                            <div>
                                <p class="text-lg font-bold text-gray-600 mb-1 text-[12px] uppercase">Efectivo</p>
                                <div class="${sector.colorNumero} rounded-xl p-4 inline-flex items-center gap-2 min-w-[200px]">
                                    <span class="text-2xl font-black text-gray-900">${formatNumber(saldoEfec)}</span>
                                    <span class="text-lg font-medium italic">gs</span>
                                </div>
                            </div>
                        </div>
                        <div class="mt-8 flex justify-between items-center">
                            <button onclick="prepararExtracto(${sector.id})" class="text-[10px] font-black bg-white/50 px-4 py-2 rounded-xl uppercase tracking-tighter">Ver Extracto</button>
                            <button onclick="abrirRegistro(${sector.id})" class="text-gray-700 hover:scale-110 transition">
                                <i class="fas fa-plus-circle text-4xl"></i>
                            </button>
                        </div>
                    </div>
                `;
            });
            document.getElementById('gran-total').innerText = `Total ${formatNumber(granTotalContinental)} gs`;
        }

        // --- FUNCIONES DE CONFIGURACIÓN DE SECTOR ---
        function abrirConfigSector(id) {
            sectorActivoId = id;
            const sector = window.datosSectores.find(s => s.id === id);
            document.getElementById('edit-nombre-sector').value = sector.nombre;
            
            const gridColores = document.getElementById('grid-colores');
            gridColores.innerHTML = '';
            opcionesColores.forEach(col => {
                const esActivo = col.fondo === sector.colorFondo;
                gridColores.innerHTML += `
                    <button onclick="seleccionarNuevoColor('${col.fondo}', '${col.numero}')" 
                        class="h-12 rounded-xl ${col.fondo} border-2 ${esActivo ? 'border-black' : 'border-transparent'} hover:scale-105 transition">
                    </button>
                `;
            });

            document.getElementById('modal-config-sector').classList.remove('hidden');
        }

        let nuevoColorFondo = null;
        let nuevoColorNumero = null;

        function seleccionarNuevoColor(f, n) {
            nuevoColorFondo = f;
            nuevoColorNumero = n;
            // Marcar visualmente la selección
            const botones = document.getElementById('grid-colores').querySelectorAll('button');
            botones.forEach(btn => btn.classList.remove('border-black'));
            event.target.classList.add('border-black');
        }

        async function guardarCambiosSector() {
            const sector = window.datosSectores.find(s => s.id === sectorActivoId);
            sector.nombre = document.getElementById('edit-nombre-sector').value;
            if(nuevoColorFondo) {
                sector.colorFondo = nuevoColorFondo;
                sector.colorNumero = nuevoColorNumero;
            }
            await window.subirAFirebase();
            cerrarConfigSector();
        }

        async function eliminarSector() {
            if(confirm("¿ESTÁS SEGURA? Se borrarán todos los saldos e historial de este sector para siempre.")) {
                window.datosSectores = window.datosSectores.filter(s => s.id !== sectorActivoId);
                await window.subirAFirebase();
                cerrarConfigSector();
            }
        }

        function cerrarConfigSector() {
            document.getElementById('modal-config-sector').classList.add('hidden');
            nuevoColorFondo = null;
        }

        // --- FUNCIONES DE MOVIMIENTOS ---
        function abrirRegistro(id, index = null) {
            sectorActivoId = id;
            editandoIndex = index;
            const sector = window.datosSectores.find(s => s.id === id);
            document.getElementById('titulo-sector-modal').innerText = sector.nombre;
            
            if(index !== null) {
                const mov = sector.historial[index];
                document.getElementById('tipo-movimiento').value = mov.tipo;
                document.getElementById('monto-movimiento').value = formatNumber(mov.monto);
                document.getElementById('desc-movimiento').value = mov.descripcion;
            } else {
                document.getElementById('monto-movimiento').value = "";
                document.getElementById('desc-movimiento').value = "";
            }
            
            document.getElementById('cuerpo-modal-movimiento').className = `rounded-3xl p-8 w-full max-w-md shadow-2xl relative border border-white ${sector.colorFondo}`;
            document.getElementById('modal-movimiento').classList.remove('hidden');
        }

        function cerrarModalMovimiento() { document.getElementById('modal-movimiento').classList.add('hidden'); }

        async function guardarMovimiento() {
            const montoInput = document.getElementById('monto-movimiento').value;
            const monto = parseInt(montoInput.replace(/\./g, "")) || 0;
            const tipo = document.getElementById('tipo-movimiento').value;
            const desc = document.getElementById('desc-movimiento').value || "Sin descripción";
            const sector = window.datosSectores.find(s => s.id === sectorActivoId);

            const movData = { 
                fecha: new Date().toLocaleDateString('es-PY'), 
                descripcion: desc, 
                monto: monto, 
                tipo: tipo 
            };

            if (editandoIndex !== null) {
                sector.historial[editandoIndex] = movData;
            } else {
                sector.historial.push(movData);
            }

            await window.subirAFirebase();
            cerrarModalMovimiento();
            if(!document.getElementById('modal-extracto').classList.contains('hidden')) {
                abrirHistorialFiltrado(tipoExtractoActivo);
            }
        }

        function prepararExtracto(id) {
            sectorActivoId = id;
            document.getElementById('modal-seleccion-extracto').classList.remove('hidden');
        }

        function cerrarSeleccionExtracto() { document.getElementById('modal-seleccion-extracto').classList.add('hidden'); }

        function abrirHistorialFiltrado(tipo) {
            tipoExtractoActivo = tipo;
            cerrarSeleccionExtracto();
            const sector = window.datosSectores.find(s => s.id === sectorActivoId);
            document.getElementById('titulo-extracto').innerText = `Extracto - ${sector.nombre}`;
            document.getElementById('subtitulo-extracto').innerText = `Filtro: ${tipo}`;
            
            const tbody = document.getElementById('tabla-historial-body');
            tbody.innerHTML = '';
            
            sector.historial.forEach((mov, index) => {
                const movEsEfectivo = mov.tipo.includes("Efectivo");
                if ((tipo === "Efectivo" && movEsEfectivo) || (tipo === "Continental" && !movEsEfectivo)) {
                    const esEgreso = mov.tipo.includes("Egreso");
                    tbody.innerHTML += `
                        <tr class="border-b border-gray-100">
                            <td class="p-4 text-xs text-gray-500">${mov.fecha}</td>
                            <td class="p-4 font-bold text-gray-700 text-sm">${mov.descripcion}</td>
                            <td class="p-4 text-right font-black ${esEgreso ? 'text-red-500' : 'text-green-600'}">
                                ${esEgreso ? '-' : '+'} ${formatNumber(mov.monto)}
                            </td>
                            <td class="p-4 text-center space-x-3">
                                <button onclick="abrirRegistro(${sectorActivoId}, ${index})" class="text-blue-500"><i class="fas fa-edit"></i></button>
                                <button onclick="eliminarMovimiento(${sectorActivoId}, ${index})" class="text-red-300 hover:text-red-500"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>
                    `;
                }
            });
            document.getElementById('modal-extracto').classList.remove('hidden');
        }

        async function eliminarMovimiento(sectorId, index) {
            if(confirm("¿Eliminar este registro permanentemente?")) {
                const sector = window.datosSectores.find(s => s.id === sectorId);
                sector.historial.splice(index, 1);
                await window.subirAFirebase();
                abrirHistorialFiltrado(tipoExtractoActivo);
            }
        }

        function cerrarExtracto() { document.getElementById('modal-extracto').classList.add('hidden'); }
    </script>
</head>
<body class="bg-[#f2f2f7] p-4 md:p-8 font-sans">

    <header class="container mx-auto flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
        <h1 class="text-4xl font-black text-gray-900 tracking-tight">Control de cuentas</h1>
        <div class="bg-white px-8 py-4 rounded-3xl shadow-sm border border-gray-200">
            <span id="gran-total" class="text-3xl font-black text-gray-800">Total 0 gs</span>
        </div>
    </header>

    <main id="contenedor-sectores" class="container mx-auto grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8 mb-12"></main>

    <!-- MODAL CONFIGURACIÓN SECTOR -->
    <div id="modal-config-sector" class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden flex items-center justify-center p-4 z-[70]">
        <div class="bg-white rounded-[32px] p-8 w-full max-w-sm shadow-2xl relative">
            <h3 class="text-xl font-black mb-6 text-gray-800">Configurar Sector</h3>
            
            <div class="space-y-6">
                <div>
                    <label class="block text-[10px] font-black uppercase text-gray-400 mb-2">Nombre del Sector</label>
                    <input type="text" id="edit-nombre-sector" class="w-full p-4 rounded-2xl bg-gray-50 border border-gray-100 font-bold outline-none focus:border-black">
                </div>

                <div>
                    <label class="block text-[10px] font-black uppercase text-gray-400 mb-2">Cambiar Color</label>
                    <div id="grid-colores" class="grid grid-cols-3 gap-3"></div>
                </div>

                <div class="pt-4 border-t border-gray-100">
                    <button onclick="eliminarSector()" class="w-full text-red-400 font-bold text-sm flex items-center justify-center gap-2 hover:text-red-600 transition">
                        <i class="fas fa-trash-alt"></i> ELIMINAR ESTE SECTOR
                    </button>
                </div>
            </div>

            <div class="flex justify-between mt-10">
                <button onclick="cerrarConfigSector()" class="font-bold text-gray-400">Cancelar</button>
                <button onclick="guardarCambiosSector()" class="bg-black text-white px-8 py-3 rounded-xl font-black shadow-lg">ACEPTAR</button>
            </div>
        </div>
    </div>

    <!-- MODAL REGISTRO MOVIMIENTO -->
    <div id="modal-movimiento" class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden flex items-center justify-center p-4 z-50">
        <div id="cuerpo-modal-movimiento" class="rounded-3xl p-8 w-full max-w-md shadow-2xl relative border border-white">
            <h2 id="titulo-sector-modal" class="text-4xl font-bold text-center mb-8">Sector</h2>
            <div class="space-y-5">
                <div>
                    <label class="block text-sm font-black uppercase text-gray-600 mb-1">Tipo</label>
                    <select id="tipo-movimiento" class="w-full p-4 rounded-2xl bg-white/60 text-lg font-bold outline-none">
                        <option value="Continental">Ingreso Continental</option>
                        <option value="Efectivo">Ingreso Efectivo</option>
                        <option value="Egreso-Continental">Egreso Continental</option>
                        <option value="Egreso-Efectivo">Egreso Efectivo</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-black uppercase text-gray-600 mb-1">Monto (Gs)</label>
                    <input type="text" id="monto-movimiento" oninput="formatearInput(this)" placeholder="0" class="w-full p-4 rounded-2xl bg-white/60 text-2xl font-black outline-none">
                </div>
                <div>
                    <label class="block text-sm font-black uppercase text-gray-600 mb-1">Concepto</label>
                    <input type="text" id="desc-movimiento" placeholder="Ej: Pago de mercadería" class="w-full p-4 rounded-2xl bg-white/60 text-lg font-bold outline-none">
                </div>
            </div>
            <div class="flex justify-between mt-10">
                <button onclick="cerrarModalMovimiento()" class="font-bold text-gray-600">Volver</button>
                <button onclick="guardarMovimiento()" class="bg-black text-white px-10 py-4 rounded-2xl font-black text-lg shadow-xl active:scale-95 transition">GUARDAR</button>
            </div>
        </div>
    </div>

    <!-- MODAL SELECCIÓN EXTRACTO -->
    <div id="modal-seleccion-extracto" class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-[40px] p-10 w-full max-w-sm shadow-2xl text-center border-8 border-gray-50">
            <h2 class="text-2xl font-black mb-8 text-gray-800">Ver historial de:</h2>
            <div class="flex flex-col gap-5">
                <button onclick="abrirHistorialFiltrado('Continental')" class="bg-blue-50 text-blue-700 py-5 rounded-3xl font-black text-xl hover:bg-blue-100 transition">CONTINENTAL</button>
                <button onclick="abrirHistorialFiltrado('Efectivo')" class="bg-green-50 text-green-700 py-5 rounded-3xl font-black text-xl hover:bg-green-100 transition">EFECTIVO</button>
                <button onclick="cerrarSeleccionExtracto()" class="mt-4 text-gray-400 font-bold">Cerrar</button>
            </div>
        </div>
    </div>

    <!-- MODAL TABLA EXTRACTO -->
    <div id="modal-extracto" class="fixed inset-0 bg-black/60 backdrop-blur-md hidden flex items-center justify-center p-4 z-[60]">
        <div class="bg-white rounded-[32px] p-8 w-full max-w-5xl max-h-[85vh] overflow-hidden flex flex-col shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h2 id="titulo-extracto" class="text-3xl font-black text-gray-900">Extracto</h2>
                    <p id="subtitulo-extracto" class="text-gray-400 font-black uppercase text-xs tracking-widest"></p>
                </div>
                <button onclick="cerrarExtracto()" class="bg-gray-100 w-10 h-10 rounded-full flex items-center justify-center text-2xl hover:bg-red-50 hover:text-red-500 transition">&times;</button>
            </div>
            <div class="overflow-x-auto flex-grow rounded-2xl border border-gray-100">
                <table class="w-full text-left border-collapse">
                    <thead class="sticky top-0 bg-gray-50">
                        <tr>
                            <th class="p-4 text-[10px] uppercase text-gray-400 font-black">Fecha</th>
                            <th class="p-4 text-[10px] uppercase text-gray-400 font-black">Descripción</th>
                            <th class="p-4 text-[10px] uppercase text-gray-400 font-black text-right">Monto</th>
                            <th class="p-4 text-[10px] uppercase text-gray-400 font-black text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-historial-body"></tbody>
                </table>
            </div>
        </div>
    </div>

</body>
</html>
