<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de cuentas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Scripts de Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDP4o3pzYG_OpZNqi3o96sUkw2AwkIUOMU",
            authDomain: "cuenta-iara.firebaseapp.com",
            projectId: "cuenta-iara",
            storageBucket: "cuenta-iara.firebasestorage.app",
            messagingSenderId: "1098942038106",
            appId: "1:1098942038106:web:03fdd648707a0e9ece5863"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const docRef = doc(db, "gestion", "cuentas");

        async function iniciarApp() {
            onSnapshot(docRef, (snapshot) => {
                if (snapshot.exists()) {
                    window.datosSectores = snapshot.data().sectores;
                    renderizarSectores();
                }
            });
        }

        async function subirAFirebase() {
            try {
                await setDoc(docRef, { sectores: window.datosSectores });
            } catch (e) {
                console.error("Error al sincronizar:", e);
            }
        }

        window.subirAFirebase = subirAFirebase;
        iniciarApp();
    </script>

    <script>
        let sectorActivoId = null;
        let tipoExtractoActivo = null;
        let editandoIndex = null;

        const opcionesColores = [
            { fondo: 'bg-[#E7F5E9]', numero: 'bg-[#C8E6C9]/40', nombre: 'Menta' },
            { fondo: 'bg-[#E3F2FD]', numero: 'bg-[#BBDEFB]/40', nombre: 'Cielo' },
            { fondo: 'bg-[#F3E5F5]', numero: 'bg-[#E1BEE7]/40', nombre: 'Lavanda' },
            { fondo: 'bg-[#FFF3E0]', numero: 'bg-[#FFE0B2]/40', nombre: 'Crema' },
            { fondo: 'bg-[#FCE4EC]', numero: 'bg-[#F8BBD0]/40', nombre: 'Rosa' },
            { fondo: 'bg-[#E0F2F1]', numero: 'bg-[#B2DFDB]/40', nombre: 'Turquesa' },
            { fondo: 'bg-[#FFFDE7]', numero: 'bg-[#FFF9C4]/40', nombre: 'Vainilla' },
            { fondo: 'bg-[#F1F8E9]', numero: 'bg-[#DCEDC8]/40', nombre: 'Lima' },
            { fondo: 'bg-[#EFEBE9]', numero: 'bg-[#D7CCC8]/40', nombre: 'Arena' },
            { fondo: 'bg-[#F5F5F5]', numero: 'bg-[#E0E0E0]/40', nombre: 'Nube' },
            { fondo: 'bg-[#E8EAF6]', numero: 'bg-[#C5CAE9]/40', nombre: 'Indigo' },
            { fondo: 'bg-[#E0F7FA]', numero: 'bg-[#B2EBF2]/40', nombre: 'Cian' }
        ];

        function formatNumber(num) {
            const isNegative = num < 0;
            const absNum = Math.abs(num);
            const formatted = absNum.toString().replace(/\D/g, "").replace(/\B(?=(\d{3})+(?!\d))/g, ".");
            return isNegative ? `-${formatted}` : formatted;
        }

        function formatearInput(input) {
            let val = input.value.replace(/\D/g, "");
            input.value = val ? val.replace(/\B(?=(\d{3})+(?!\d))/g, ".") : "";
        }

        function calcularSaldo(sectorId, tipo) {
            const sector = window.datosSectores.find(s => s.id === sectorId);
            if(!sector) return 0;
            return sector.historial.reduce((acc, mov) => {
                const esEfectivo = mov.tipo.includes("Efectivo");
                const esEgreso = mov.tipo.includes("Egreso");
                if (tipo === "Efectivo" && esEfectivo) return acc + (esEgreso ? -mov.monto : mov.monto);
                if (tipo === "Continental" && !esEfectivo) return acc + (esEgreso ? -mov.monto : mov.monto);
                return acc;
            }, 0);
        }

        function renderizarSectores() {
            const contenedor = document.getElementById('contenedor-sectores');
            if(!contenedor) return;
            contenedor.innerHTML = '';
            
            let granTotalContinental = 0;
            window.datosSectores.forEach((sector) => {
                const saldoCont = calcularSaldo(sector.id, "Continental");
                const saldoEfec = calcularSaldo(sector.id, "Efectivo");
                granTotalContinental += saldoCont;

                // Lógica de colores para negativos
                const colorTextoCont = saldoCont < 0 ? 'text-red-600' : 'text-gray-900';
                const colorTextoEfec = saldoEfec < 0 ? 'text-red-600' : 'text-gray-900';

                contenedor.innerHTML += `
                    <div class="${sector.colorFondo} rounded-[32px] p-8 shadow-sm relative border border-white/50 transition-all hover:shadow-md">
                        <div class="flex justify-between items-start mb-6">
                            <h2 class="text-2xl font-black text-gray-800 tracking-tight">${sector.nombre}</h2>
                            <button onclick="abrirConfigSector(${sector.id})" class="text-gray-400 hover:text-gray-600 p-2">
                                <i class="fas fa-cog text-lg"></i>
                            </button>
                        </div>
                        <div class="space-y-6">
                            <div>
                                <p class="text-[10px] font-black text-gray-500 mb-1 uppercase tracking-widest">Continental</p>
                                <div class="${sector.colorNumero} rounded-2xl p-4 inline-flex items-center gap-2 min-w-[180px]">
                                    <span class="text-2xl font-black ${colorTextoCont}">${formatNumber(saldoCont)}</span>
                                    <span class="text-xs font-bold text-gray-500 uppercase">gs</span>
                                </div>
                            </div>
                            <div>
                                <p class="text-[10px] font-black text-gray-500 mb-1 uppercase tracking-widest">Efectivo</p>
                                <div class="${sector.colorNumero} rounded-2xl p-4 inline-flex items-center gap-2 min-w-[180px]">
                                    <span class="text-2xl font-black ${colorTextoEfec}">${formatNumber(saldoEfec)}</span>
                                    <span class="text-xs font-bold text-gray-500 uppercase">gs</span>
                                </div>
                            </div>
                        </div>
                        <div class="mt-8 flex justify-between items-center">
                            <button onclick="prepararExtracto(${sector.id})" class="text-[9px] font-black bg-white/40 hover:bg-white/60 px-4 py-2 rounded-xl uppercase tracking-widest transition">Historial</button>
                            <button onclick="abrirRegistro(${sector.id})" class="text-gray-800 hover:scale-110 transition active:scale-95">
                                <i class="fas fa-plus-circle text-4xl"></i>
                            </button>
                        </div>
                    </div>
                `;
            });
            
            const totalElement = document.getElementById('gran-total');
            totalElement.innerText = `${formatNumber(granTotalContinental)} gs`;
            totalElement.className = `text-3xl font-black ${granTotalContinental < 0 ? 'text-red-600' : 'text-gray-900'}`;
        }

        // Resto de funciones se mantienen igual...
        function abrirConfigSector(id) {
            sectorActivoId = id;
            const sector = window.datosSectores.find(s => s.id === id);
            document.getElementById('edit-nombre-sector').value = sector.nombre;
            const gridColores = document.getElementById('grid-colores');
            gridColores.innerHTML = '';
            opcionesColores.forEach(col => {
                const esActivo = col.fondo === sector.colorFondo;
                gridColores.innerHTML += `
                    <button onclick="seleccionarNuevoColor('${col.fondo}', '${col.numero}')" 
                        class="h-10 w-10 rounded-full ${col.fondo} border-2 ${esActivo ? 'border-black scale-110' : 'border-white'} shadow-sm hover:scale-110 transition">
                    </button>
                `;
            });
            document.getElementById('modal-config-sector').classList.remove('hidden');
        }

        let nuevoColorFondo = null;
        let nuevoColorNumero = null;

        function seleccionarNuevoColor(f, n) {
            nuevoColorFondo = f;
            nuevoColorNumero = n;
            const botones = document.getElementById('grid-colores').querySelectorAll('button');
            botones.forEach(btn => btn.classList.remove('border-black', 'scale-110'));
            event.target.classList.add('border-black', 'scale-110');
        }

        async function guardarCambiosSector() {
            const sector = window.datosSectores.find(s => s.id === sectorActivoId);
            sector.nombre = document.getElementById('edit-nombre-sector').value;
            if(nuevoColorFondo) {
                sector.colorFondo = nuevoColorFondo;
                sector.colorNumero = nuevoColorNumero;
            }
            await window.subirAFirebase();
            cerrarConfigSector();
        }

        async function eliminarSector() {
            if(confirm("¿Segura que deseas eliminar este sector?")) {
                window.datosSectores = window.datosSectores.filter(s => s.id !== sectorActivoId);
                await window.subirAFirebase();
                cerrarConfigSector();
            }
        }

        function cerrarConfigSector() {
            document.getElementById('modal-config-sector').classList.add('hidden');
            nuevoColorFondo = null;
        }

        function abrirRegistro(id, index = null) {
            sectorActivoId = id;
            editandoIndex = index;
            const sector = window.datosSectores.find(s => s.id === id);
            document.getElementById('titulo-sector-modal').innerText = sector.nombre;
            if(index !== null) {
                const mov = sector.historial[index];
                document.getElementById('tipo-movimiento').value = mov.tipo;
                document.getElementById('monto-movimiento').value = formatNumber(mov.monto).replace('-', '');
                document.getElementById('desc-movimiento').value = mov.descripcion;
            } else {
                document.getElementById('monto-movimiento').value = "";
                document.getElementById('desc-movimiento').value = "";
            }
            document.getElementById('cuerpo-modal-movimiento').className = `rounded-[40px] p-10 w-full max-w-md shadow-2xl relative border border-white ${sector.colorFondo}`;
            document.getElementById('modal-movimiento').classList.remove('hidden');
        }

        function cerrarModalMovimiento() { document.getElementById('modal-movimiento').classList.add('hidden'); }

        async function guardarMovimiento() {
            const montoInput = document.getElementById('monto-movimiento').value;
            const monto = parseInt(montoInput.replace(/\./g, "")) || 0;
            const tipo = document.getElementById('tipo-movimiento').value;
            const desc = document.getElementById('desc-movimiento').value || "Sin descripción";
            const sector = window.datosSectores.find(s => s.id === sectorActivoId);

            const movData = { 
                fecha: new Date().toLocaleDateString('es-PY'), 
                descripcion: desc, 
                monto: monto, 
                tipo: tipo 
            };

            if (editandoIndex !== null) {
                sector.historial[editandoIndex] = movData;
            } else {
                sector.historial.push(movData);
            }

            await window.subirAFirebase();
            cerrarModalMovimiento();
            if(!document.getElementById('modal-extracto').classList.contains('hidden')) {
                abrirHistorialFiltrado(tipoExtractoActivo);
            }
        }

        function prepararExtracto(id) {
            sectorActivoId = id;
            document.getElementById('modal-seleccion-extracto').classList.remove('hidden');
        }

        function cerrarSeleccionExtracto() { document.getElementById('modal-seleccion-extracto').classList.add('hidden'); }

        function abrirHistorialFiltrado(tipo) {
            tipoExtractoActivo = tipo;
            cerrarSeleccionExtracto();
            const sector = window.datosSectores.find(s => s.id === sectorActivoId);
            document.getElementById('titulo-extracto').innerText = `Extracto - ${sector.nombre}`;
            document.getElementById('subtitulo-extracto').innerText = `Filtro: ${tipo}`;
            const tbody = document.getElementById('tabla-historial-body');
            tbody.innerHTML = '';
            sector.historial.forEach((mov, index) => {
                const movEsEfectivo = mov.tipo.includes("Efectivo");
                if ((tipo === "Efectivo" && movEsEfectivo) || (tipo === "Continental" && !movEsEfectivo)) {
                    const esEgreso = mov.tipo.includes("Egreso");
                    tbody.innerHTML += `
                        <tr class="border-b border-gray-50">
                            <td class="p-4 text-[10px] text-gray-400 font-bold">${mov.fecha}</td>
                            <td class="p-4 font-bold text-gray-700 text-sm">${mov.descripcion}</td>
                            <td class="p-4 text-right font-black ${esEgreso ? 'text-red-400' : 'text-emerald-500'}">
                                ${esEgreso ? '-' : '+'} ${formatNumber(mov.monto).replace('-', '')}
                            </td>
                            <td class="p-4 text-center space-x-3">
                                <button onclick="abrirRegistro(${sectorActivoId}, ${index})" class="text-blue-300 hover:text-blue-500"><i class="fas fa-edit"></i></button>
                                <button onclick="eliminarMovimiento(${sectorActivoId}, ${index})" class="text-red-200 hover:text-red-400"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>
                    `;
                }
            });
            document.getElementById('modal-extracto').classList.remove('hidden');
        }

        async function eliminarMovimiento(sectorId, index) {
            if(confirm("¿Eliminar este registro?")) {
                const sector = window.datosSectores.find(s => s.id === sectorId);
                sector.historial.splice(index, 1);
                await window.subirAFirebase();
                abrirHistorialFiltrado(tipoExtractoActivo);
            }
        }

        function cerrarExtracto() { document.getElementById('modal-extracto').classList.add('hidden'); }
    </script>
</head>
<body class="bg-[#F8F9FA] p-4 md:p-8 font-sans">

    <header class="container mx-auto flex flex-col md:flex-row justify-between items-center mb-12 gap-4">
        <div>
            <h1 class="text-4xl font-black text-gray-900 tracking-tighter">Control de cuentas</h1>
            <p class="text-gray-400 font-bold text-xs uppercase tracking-widest mt-1">Gestión Financiera</p>
        </div>
        <div class="bg-white px-10 py-5 rounded-[24px] shadow-sm border border-gray-100 text-center">
            <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">Total Continental</p>
            <span id="gran-total" class="text-3xl font-black text-gray-900">0 gs</span>
        </div>
    </header>

    <main id="contenedor-sectores" class="container mx-auto grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8 mb-12"></main>

    <!-- MODALES (CONFIG, MOVIMIENTO, SELECCIÓN, EXTRACTO) -->
    <!-- Se mantienen igual que en tu versión original -->
    <div id="modal-config-sector" class="fixed inset-0 bg-black/30 backdrop-blur-md hidden flex items-center justify-center p-4 z-[70]">
        <div class="bg-white rounded-[40px] p-10 w-full max-w-sm shadow-2xl relative border border-gray-50">
            <h3 class="text-2xl font-black mb-8 text-gray-900 tracking-tight text-center">Configurar</h3>
            <div class="space-y-8">
                <div>
                    <label class="block text-[10px] font-black uppercase text-gray-400 mb-3 tracking-widest">Nombre</label>
                    <input type="text" id="edit-nombre-sector" class="w-full p-4 rounded-2xl bg-gray-50 border-none font-bold outline-none focus:ring-2 ring-gray-100">
                </div>
                <div>
                    <label class="block text-[10px] font-black uppercase text-gray-400 mb-3 tracking-widest text-center">Colores Pasteles</label>
                    <div id="grid-colores" class="flex flex-wrap justify-center gap-3"></div>
                </div>
                <div class="pt-6 border-t border-gray-50">
                    <button onclick="eliminarSector()" class="w-full text-red-300 font-black text-[10px] uppercase tracking-widest hover:text-red-500 transition">Eliminar Sector</button>
                </div>
            </div>
            <div class="flex flex-col gap-3 mt-10">
                <button onclick="guardarCambiosSector()" class="bg-black text-white w-full py-4 rounded-2xl font-black shadow-lg active:scale-95 transition">GUARDAR CAMBIOS</button>
                <button onclick="cerrarConfigSector()" class="text-gray-400 font-bold text-sm">Cerrar</button>
            </div>
        </div>
    </div>

    <div id="modal-movimiento" class="fixed inset-0 bg-black/30 backdrop-blur-md hidden flex items-center justify-center p-4 z-50">
        <div id="cuerpo-modal-movimiento" class="rounded-[40px] p-10 w-full max-w-md shadow-2xl relative border border-white">
            <h2 id="titulo-sector-modal" class="text-3xl font-black text-center mb-8 tracking-tighter">Sector</h2>
            <div class="space-y-6">
                <div>
                    <label class="block text-[10px] font-black uppercase text-gray-500 mb-2 tracking-widest">Tipo</label>
                    <select id="tipo-movimiento" class="w-full p-4 rounded-2xl bg-white/50 text-lg font-bold outline-none border-none">
                        <option value="Continental">Ingreso Continental</option>
                        <option value="Efectivo">Ingreso Efectivo</option>
                        <option value="Egreso-Continental">Egreso Continental</option>
                        <option value="Egreso-Efectivo">Egreso Efectivo</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-black uppercase text-gray-500 mb-2 tracking-widest">Monto (Gs)</label>
                    <input type="text" id="monto-movimiento" oninput="formatearInput(this)" placeholder="0" class="w-full p-4 rounded-2xl bg-white/50 text-2xl font-black outline-none border-none">
                </div>
                <div>
                    <label class="block text-[10px] font-black uppercase text-gray-500 mb-2 tracking-widest">Concepto</label>
                    <input type="text" id="desc-movimiento" placeholder="..." class="w-full p-4 rounded-2xl bg-white/50 text-lg font-bold outline-none border-none">
                </div>
            </div>
            <div class="flex flex-col gap-3 mt-10">
                <button onclick="guardarMovimiento()" class="bg-black text-white w-full py-5 rounded-2xl font-black text-lg shadow-xl active:scale-95 transition">CONFIRMAR</button>
                <button onclick="cerrarModalMovimiento()" class="text-gray-500 font-bold text-sm">Cancelar</button>
            </div>
        </div>
    </div>

    <div id="modal-seleccion-extracto" class="fixed inset-0 bg-black/30 backdrop-blur-md hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-[40px] p-10 w-full max-w-sm shadow-2xl text-center">
            <h2 class="text-xl font-black mb-8 text-gray-800 tracking-tight">Selecciona historial:</h2>
            <div class="flex flex-col gap-4">
                <button onclick="abrirHistorialFiltrado('Continental')" class="bg-blue-50 text-blue-600 py-5 rounded-2xl font-black text-lg hover:bg-blue-100 transition">BANCO</button>
                <button onclick="abrirHistorialFiltrado('Efectivo')" class="bg-emerald-50 text-emerald-600 py-5 rounded-2xl font-black text-lg hover:bg-emerald-100 transition">EFECTIVO</button>
                <button onclick="cerrarSeleccionExtracto()" class="mt-4 text-gray-300 font-bold text-xs uppercase tracking-widest">Cerrar</button>
            </div>
        </div>
    </div>

    <div id="modal-extracto" class="fixed inset-0 bg-black/50 backdrop-blur-lg hidden flex items-center justify-center p-4 z-[60]">
        <div class="bg-white rounded-[40px] p-8 w-full max-w-4xl max-h-[80vh] overflow-hidden flex flex-col shadow-2xl border border-gray-100">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h2 id="titulo-extracto" class="text-2xl font-black text-gray-900 tracking-tighter">Historial</h2>
                    <p id="subtitulo-extracto" class="text-[10px] text-gray-400 font-black uppercase tracking-widest"></p>
                </div>
                <button onclick="cerrarExtracto()" class="bg-gray-50 w-12 h-12 rounded-full flex items-center justify-center text-2xl hover:bg-red-50 hover:text-red-500 transition shadow-sm">&times;</button>
            </div>
            <div class="overflow-x-auto flex-grow rounded-[24px]">
                <table class="w-full text-left">
                    <thead class="sticky top-0 bg-gray-50">
                        <tr>
                            <th class="p-4 text-[9px] uppercase text-gray-400 font-black tracking-widest">Fecha</th>
                            <th class="p-4 text-[9px] uppercase text-gray-400 font-black tracking-widest">Concepto</th>
                            <th class="p-4 text-[9px] uppercase text-gray-400 font-black tracking-widest text-right">Monto</th>
                            <th class="p-4 text-[9px] uppercase text-gray-400 font-black tracking-widest text-center"></th>
                        </tr>
                    </thead>
                    <tbody id="tabla-historial-body"></tbody>
                </table>
            </div>
        </div>
    </div>

</body>
</html>
