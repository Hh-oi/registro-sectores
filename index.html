<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rescate de Datos - L'Atelier</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDP4o3pzYG_OpZNqi3o96sUkw2AwkIUOMU",
            authDomain: "cuenta-iara.firebaseapp.com",
            projectId: "cuenta-iara",
            storageBucket: "cuenta-iara.firebasestorage.app",
            messagingSenderId: "1098942038106",
            appId: "1:1098942038106:web:03fdd648707a0e9ece5863"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const docRef = doc(db, "gestion", "cuentas");

        // --- FUNCIÓN DE RESCATE MANUAL ---
        async function forzarRescate() {
            const datosLocales = localStorage.getItem('cuentasData_v4');
            if (datosLocales) {
                const confirmacion = confirm("He encontrado datos en esta PC. ¿Quieres subirlos a la nube ahora?");
                if (confirmacion) {
                    window.datosSectores = JSON.parse(datosLocales);
                    await setDoc(docRef, { sectores: window.datosSectores });
                    alert("¡ÉXITO! Los datos ya están en la nube. Revisa tu celular.");
                    location.reload(); // Recarga para ver los cambios
                }
            } else {
                alert("No encontré la cajita 'cuentasData_v4' en esta PC.");
            }
        }

        async function iniciarApp() {
            // Escuchar cambios de Firebase
            onSnapshot(docRef, (snapshot) => {
                if (snapshot.exists()) {
                    window.datosSectores = snapshot.data().sectores;
                    renderizarSectores();
                } else {
                    // Si Firebase está vacío, mostramos sectores base pero NO guardamos nada aún
                    window.datosSectores = [
                        { id: 0, nombre: "Boutique", colorFondo: "bg-[#f8ccab]", colorNumero: "bg-[#f1ab66]", historial: [] },
                        { id: 1, nombre: "Supermercado", colorFondo: "bg-[#f9d1d1]", colorNumero: "bg-[#f18c94]", historial: [] }
                    ];
                    renderizarSectores();
                }
            });
        }

        window.forzarRescate = forzarRescate;
        iniciarApp();
    </script>

    <script>
        // Funciones básicas de visualización
        function formatNumber(num) { return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, "."); }

        function renderizarSectores() {
            const contenedor = document.getElementById('contenedor-sectores');
            if(!contenedor) return;
            contenedor.innerHTML = '';
            window.datosSectores.forEach((sector) => {
                contenedor.innerHTML += `
                    <div class="${sector.colorFondo} rounded-3xl p-6 shadow-sm">
                        <h2 class="text-2xl font-bold mb-4">${sector.nombre}</h2>
                        <p class="text-sm font-bold text-gray-600">Revisa el historial para ver tus datos recuperados.</p>
                    </div>
                `;
            });
        }
    </script>
</head>
<body class="bg-gray-100 p-6">
    <div class="max-w-4xl mx-auto">
        <!-- BOTÓN DE RESCATE -->
        <div class="bg-red-600 p-6 rounded-2xl mb-8 text-white text-center shadow-xl">
            <h1 class="text-xl font-black mb-2 uppercase">¡Zona de Rescate!</h1>
            <p class="mb-4">Haz clic abajo para subir los datos de esta computadora a la nube.</p>
            <button onclick="forzarRescate()" class="bg-white text-red-600 px-8 py-3 rounded-xl font-black text-lg hover:bg-gray-100">
                RECUPERAR DATOS DE ESTA PC
            </button>
        </div>

        <div id="contenedor-sectores" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </div>
</body>
</html>
